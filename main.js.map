export default "<div\n  id=\"profile-list\"\n  class=\"mt-3 container d-flex flex-wrap align-items-center justify-content-center\"\n>\n  <div\n    data-aos=\"fade-in\"\n    class=\"profile-entry\"\n    *ngFor=\"let entry of profileEntries | async\"\n  >\n    <mat-icon>{{ entry.icon }}</mat-icon>\n    <div class=\"profile-title\">{{ entry.title }}</div>\n    <h2 class=\"profile-content\">\n      {{ entry.content }}\n    </h2>\n  </div>\n</div>\n";
