export default "<div\n  id=\"project-cards\"\n  class=\"mt-3 container flex-wrap align-items-center justify-content-center\"\n>\n  <div\n    class=\"project-card\"\n    *ngFor=\"let project of projects | async\"\n    data-aos=\"fade-in\"\n  >\n    <img\n      class=\"project-image\"\n      width=\"100px\"\n      [src]=\"project.image\"\n      [alt]=\"project.imageAlt\"\n    />\n    <h2 class=\"project-title\">{{ project.name }}</h2>\n\n    <p class=\"project-description\">{{ project.description }}</p>\n    <div class=\"button-group\">\n      <button\n        mat-stroked-button\n        color=\"primary\"\n        (click)=\"goToLink(project.url)\"\n      >\n        <span>Open</span>\n      </button>\n      <button class=\"ms-2\" mat-button (click)=\"goToLink(project.sourceUrl)\">\n        Source\n      </button>\n    </div>\n  </div>\n</div>\n";
