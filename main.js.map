export default "<mat-toolbar id=\"toolbar\" class=\"fixed-top hide\">\n  <div class=\"container\">\n    <div class=\"toolbar-title-area\">\n      <a href=\"/\" class=\"toolbar-title\">Philipp Kief</a>\n    </div>\n    <div class=\"dark-mode-toggle-area\">\n      <button\n        mat-icon-button\n        matTooltip=\"Toggle Dark Mode\"\n        aria-label=\"Button to toggle dark mode\"\n        (click)=\"toggleTheme()\"\n      >\n        <mat-icon>{{\n          (theme | async) === \"dark-theme\" ? \"wb_sunny\" : \"brightness_2\"\n        }}</mat-icon>\n      </button>\n    </div>\n  </div>\n</mat-toolbar>\n";
