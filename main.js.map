export default "<div id=\"article-cards\" class=\"mt-3 container\">\n  <div\n    class=\"article-card row\"\n    *ngFor=\"let article of articles | async\"\n    data-aos=\"fade-in\"\n  >\n    <div class=\"col-12 col-md-3\">\n      <div\n        class=\"article-image\"\n        [style.backgroundImage]=\"'url(' + article.image + ')'\"\n      ></div>\n    </div>\n    <div class=\"article-details col-12 col-md-9\">\n      <h2 class=\"article-title\">{{ article.title }}</h2>\n\n      <p class=\"article-description\">{{ article.subtitle }}</p>\n      <button\n        mat-stroked-button\n        color=\"primary\"\n        (click)=\"goToLink(article.url)\"\n      >\n        <span>Read</span>\n      </button>\n    </div>\n  </div>\n</div>\n";
