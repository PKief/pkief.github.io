export default "<div class=\"app\" [ngClass]=\"theme | async\">\n  <app-toolbar></app-toolbar>\n  <app-scroll-down-indicator></app-scroll-down-indicator>\n  <app-section [colorTheme]=\"'primary'\">\n    <div>\n      <img\n        id=\"profile-image\"\n        src=\"assets/profile-image.jpg\"\n        alt=\"Profile Image\"\n      />\n    </div>\n    <div class=\"title\">Philipp Kief</div>\n    <div class=\"subtitle\">Software Engineer</div>\n    <app-social-links></app-social-links>\n    <app-sponsor-button class=\"mt-4\"></app-sponsor-button>\n  </app-section>\n  <app-section [colorTheme]=\"'tertiary'\">\n    <h1 data-aos=\"fade-in\">Profile</h1>\n    <app-profile-list></app-profile-list>\n  </app-section>\n  <app-section [colorTheme]=\"'secondary'\">\n    <h1 data-aos=\"fade-in\">Projects</h1>\n    <app-project-list></app-project-list>\n  </app-section>\n  <app-section [colorTheme]=\"'tertiary'\">\n    <h1 data-aos=\"fade-in\">Articles</h1>\n    <app-article-list></app-article-list>\n  </app-section>\n  <app-footer></app-footer>\n</div>\n";
